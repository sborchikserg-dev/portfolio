<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Агрохімія</title>

  <style>
    body{margin:0;font-family:sans-serif;background:#f4f4f4;padding:40px}
    h1{margin:0 0 18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .card img{width:100%;height:250px;object-fit:cover;display:block}
    .p{padding:14px;text-align:center}
    .back{display:inline-block;margin-bottom:22px;text-decoration:none;background:#2e7d32;color:#fff;padding:8px 14px;border-radius:8px}
    .note{color:#555;margin:0 0 18px}
    .cart-link{display:inline-block;margin:0 0 18px;text-decoration:none;background:#fff;border:1px solid rgba(0,0,0,.1);padding:8px 12px;border-radius:10px;color:#1f2a1f;font-weight:700}
  </style>
</head>
<body>
  <script>
  function getCart(){ return JSON.parse(localStorage.getItem("cart") || "[]"); }
  function setCart(cart){ localStorage.setItem("cart", JSON.stringify(cart)); }
  function updateCartCount(){
    const cart = getCart();
    const count = cart.reduce((sum, item) => sum + item.qty, 0);
    const el = document.getElementById("cartCount");
    if(el) el.textContent = count;
  }

  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".add-to-cart");
    if(!btn) return;

    const name = btn.dataset.name;
    const price = Number(btn.dataset.price);

    const cart = getCart();
    const existing = cart.find(i => i.name === name);
    if(existing) existing.qty += 1;
    else cart.push({ name, price, qty: 1 });

    setCart(cart);
    updateCartCount();

    btn.textContent = "Додано ✅";
    setTimeout(() => btn.textContent = "До кошика", 900);
  });

  updateCartCount();
</script>
  <a href="cart.html" class="cart-link">🛒 Кошик (<span id="cartCount">0</span>)</a>
<button class="btn-order add-to-cart" data-name="Туя" data-price="450">До кошика</button>
  <a href="index.html" class="back">← Назад до магазину</a>
  <h1>Агрохімія</h1>
  <p class="note">Підберемо засоби догляду під ваші рослини.</p>

  <div class="grid">

    <div class="card">
      <img src="images/agrohim-1.jpg" alt="Добриво">
      <div class="p">
        <h3>Добриво універсальне</h3>
        <div>від 120 грн</div>
      </div>
    </div>

    <div class="card">
      <img src="images/agrohim-2.jpg" alt="Грунт">
      <div class="p">
        <h3>Грунт для кімнатних</h3>
        <div>від 90 грн</div>
      </div>
    </div>

    <div class="card">
      <img src="images/agrohim-3.jpg" alt="Засіб від шкідників">
      <div class="p">
        <h3>Засіб від шкідників</h3>
        <div>від 110 грн</div>
      </div>
    </div>

  </div>

</body>
</html>
