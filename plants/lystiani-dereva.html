<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Листяні дерева</title>

  <style>
    body{margin:0;font-family:sans-serif;background:#f4f4f4;padding:40px}
    h1{margin:0 0 18px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
    .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 10px 25px rgba(0,0,0,.08)}
    .card img{width:100%;height:250px;object-fit:cover;display:block}
    .p{padding:14px;text-align:center}
    .back{display:inline-block;margin-bottom:22px;text-decoration:none;background:#2e7d32;color:#fff;padding:8px 14px;border-radius:8px}
  </style>
</head>
<body>

  <a href="index.html" class="back">← Назад до магазину</a>
  <h1>Листяні дерева</h1>

  <div class="grid">

    <div class="card">
      <img src="images/lystiane-derevo-1.jpg" alt="Листяне дерево">
      <div class="p">
        <h3>Клен</h3>
        <div>від 450 грн</div>
      </div>
    </div>

    <div class="card">
      <img src="images/lystiane-derevo-2.jpg" alt="Листяне дерево">
      <div class="p">
        <h3>Береза</h3>
        <div>від 380 грн</div>
      </div>
    </div>

    <div class="card">
      <img src="images/lystiane-derevo-3.jpg" alt="Листяне дерево">
      <div class="p">
        <h3>Липа</h3>
        <div>від 420 грн</div>
      </div>
    </div>

  </div>

</body>
</html>
